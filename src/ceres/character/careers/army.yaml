name: Army
description: >-
  Members of the planetary armed fighting forces. Soldiers deal with planetary surface actions, battles and
  campaigns. Such individuals may also be mercenaries for hire.
source: Core
allows_assignment_change: true
draft: true
commission:
  characteristic: SOC
  target: 8

qualification:
  characteristic: END
  target: 5

assignments:
  - name: Support
    description: You are an engineer, cook or in some other role behind the front lines.
    survival: {characteristic: END, target: 5}
    advancement: {characteristic: EDU, target: 7}
  - name: Infantry
    description: You are one of the Poor Bloody Infantry on the ground.
    survival: {characteristic: STR, target: 6}
    advancement: {characteristic: EDU, target: 6}
  - name: Cavalry
    description: You are one of the crew of a gunship or tank.
    survival: {characteristic: DEX, target: 7}
    advancement: {characteristic: INT, target: 5}

skill_tables:
  personal_development:
    1: {characteristic: STR}
    2: {characteristic: DEX}
    3: {characteristic: END}
    4: {skill: Gambler}
    5: {skill: Medic}
    6: {skill: Melee}
  service_skills:
    1: {choices: [Drive, Vacc Suit]}
    2: {skill: Athletics}
    3: {skill: Gun Combat}
    4: {skill: Recon}
    5: {skill: Melee}
    6: {skill: Heavy Weapons}
  advanced_education:
    min_edu: 8
    1: {skill: Tactics, spec: Military}
    2: {skill: Electronics}
    3: {skill: Navigation}
    4: {skill: Explosives}
    5: {skill: Engineer}
    6: {skill: Survival}
  officer:
    1: {skill: Tactics, spec: Military}
    2: {skill: Leadership}
    3: {skill: Advocate}
    4: {skill: Diplomat}
    5: {skill: Electronics}
    6: {skill: Admin}
  support:
    1: {skill: Mechanic}
    2: {choices: [Drive, Flyer]}
    3: {skill: Profession}
    4: {skill: Explosives}
    5: {skill: Electronics, spec: Comms}
    6: {skill: Medic}
  infantry:
    1: {skill: Gun Combat}
    2: {skill: Melee}
    3: {skill: Heavy Weapons}
    4: {skill: Stealth}
    5: {skill: Athletics}
    6: {skill: Recon}
  cavalry:
    1: {skill: Mechanic}
    2: {skill: Drive}
    3: {skill: Flyer}
    4: {skill: Recon}
    5: {skill: Heavy Weapons, spec: Vehicle}
    6: {skill: Electronics, spec: Sensors}

ranks:
  0: {title: Private, bonus: {skill: Gun Combat, level: 1}}
  1: {title: Lance Corporal, bonus: {skill: Recon, level: 1}}
  2: {title: Corporal}
  3: {title: Lance Sergeant, bonus: {skill: Leadership, level: 1}}
  4: {title: Sergeant}
  5: {title: Gunnery Sergeant}
  6: {title: Sergeant Major}

officer_ranks:
  1: {title: Lieutenant, bonus: {skill: Leadership, level: 1}}
  2: {title: Captain}
  3: {title: Major, bonus: {skill: Tactics, level: 1}}
  4: {title: Lieutenant Colonel}
  5: {title: Colonel}
  6: {title: General, bonus: {characteristic: SOC, level: 1}}

muster_out:
  1: {cash: 2000, benefit: cybernetic_implant}
  2: {cash: 5000, benefit: int_plus_1}
  3: {cash: 10000, benefit: edu_plus_1}
  4: {cash: 10000, benefit: weapon}
  5: {cash: 10000, benefit: armor}
  6: {cash: 20000, benefit: [end_plus_1, cybernetic_implant]}
  7: {cash: 30000, benefit: soc_plus_1}

mishaps:
  1: {text: Severely injured in action., effects: [{type: injury, severity: severe}]}
  2:
    text: Your unit is slaughtered in a disastrous battle. Gain the commander as an Enemy.
    effects:
      - {type: gain_enemy}
  3:
    text: You are discharged after a brutal campaign. Increase Recon or Survival and gain an Enemy.
    effects:
      - {type: gain_enemy}
      - {type: skill_choice, options: [Recon, Survival], level: 1}
  4:
    text: You uncover illegal activity by your commanding officer.
    defer_ejection: true
    effects:
      - {type: army_mishap_4}
  5: {text: You quarrel with an officer or fellow soldier. Gain a Rival., effects: [{type: gain_rival}]}
  6: {text: Injured. Roll on the Injury table., effects: [{type: injury, severity: from_table}]}

events:
  2:
    text: Disaster! Roll on the Mishap table but you are not ejected from this career.
    effects:
      - {type: roll_mishap, leave: false}
  3:
    text: You are assigned to a hostile or wild environment.
    effects:
      - {type: skill_choice, options: [Vacc Suit, Engineer, Animals, Recon], level: 1}
  4:
    text: You are assigned to an urbanised planet torn by war.
    effects:
      - {type: skill_choice, options: [Stealth, Streetwise, Persuade, Recon], level: 1}
  5: {text: You are given a special assignment or duty in your unit., effects: [{type: benefit_dm, amount: 1}]}
  6: {text: You are thrown into a brutal ground war., effects: [{type: army_event_6}]}
  7: {text: Life Event., effects: [{type: life_event}]}
  8: {text: You are given advanced training in a specialist field., effects: [{type: army_event_8}]}
  9:
    text: Surrounded and outnumbered, you hold out until relief arrives.
    effects:
      - {type: advancement_dm, amount: 2}
  10:
    text: You are assigned to a peacekeeping role.
    effects:
      - {type: skill_choice, options: [Admin, Investigate, Deception, Recon], level: 1}
  11:
    text: Your commanding officer takes an interest in your career.
    effects:
      - {type: skill_choice, options: [Tactics, advancement_dm_4], level: 1}
  12:
    text: You display heroism in battle. You may gain a promotion or a commission automatically.
    effects:
      - {type: auto_advance}
