name: Citizen
description: >-
  Individuals serving in a corporation, bureaucracy or industry, or who are making a new life on an untamed planet.
source: Core
allows_assignment_change: false

qualification:
  characteristic: EDU
  target: 5

assignments:
  - name: Corporate
    description: You are an executive or manager in a large corporation.
    survival: {characteristic: SOC, target: 6}
    advancement: {characteristic: INT, target: 6}
  - name: Worker
    description: You are a blue collar worker on an industrial world.
    survival: {characteristic: END, target: 4}
    advancement: {characteristic: EDU, target: 8}
  - name: Colonist
    description: You are building a new life on a recently settled world that still needs taming.
    survival: {characteristic: INT, target: 7}
    advancement: {characteristic: END, target: 5}

skill_tables:
  personal_development:
    1: {characteristic: EDU}
    2: {characteristic: INT}
    3: {skill: Carouse}
    4: {skill: Gambler}
    5: {skill: Drive}
    6: {skill: Jack-of-All-Trades}
  service_skills:
    1: {skill: Drive}
    2: {skill: Flyer}
    3: {skill: Streetwise}
    4: {skill: Melee}
    5: {skill: Steward}
    6: {skill: Profession}
  advanced_education:
    min_edu: 10
    1: {skill: Art}
    2: {skill: Advocate}
    3: {skill: Diplomat}
    4: {skill: Language}
    5: {skill: Electronics, spec: Computers}
    6: {skill: Medic}
  corporate:
    1: {skill: Advocate}
    2: {skill: Admin}
    3: {skill: Broker}
    4: {skill: Electronics, spec: Computers}
    5: {skill: Diplomat}
    6: {skill: Leadership}
  worker:
    1: {skill: Drive}
    2: {skill: Mechanic}
    3: {skill: Electronics}
    4: {skill: Engineer}
    5: {skill: Profession}
    6: {skill: Science}
  colonist:
    1: {skill: Animals}
    2: {skill: Athletics}
    3: {skill: Jack-of-All-Trades}
    4: {skill: Drive}
    5: {skill: Survival}
    6: {skill: Recon}

ranks:
  0: {}
  1: {}
  2: {}
  3: {}
  4: {}
  5: {}
  6: {}

ranks_by_assignment:
  Corporate:
    0: {}
    1: {}
    2: {title: Manager, bonus: {skill: Admin, level: 1}}
    3: {}
    4: {title: Senior Manager, bonus: {skill: Advocate, level: 1}}
    5: {}
    6: {title: Director, bonus: {characteristic: SOC, level: 1}}
  Worker:
    0: {}
    1: {}
    2: {title: Technician, bonus: {skill: Profession, level: 1}}
    3: {}
    4: {title: Craftsman, bonus: {skill: Mechanic, level: 1}}
    5: {}
    6: {title: Master Technician, bonus: {skill: Engineer, level: 1}}
  Colonist:
    0: {}
    1: {}
    2: {title: Settler, bonus: {skill: Survival, level: 1}}
    3: {}
    4: {title: Explorer, bonus: {skill: Navigation, level: 1}}
    5: {}
    6: {bonus: {skill: Gun Combat, level: 1}}

muster_out:
  1: {cash: 2000, benefit: ship_share}
  2: {cash: 5000, benefit: ally}
  3: {cash: 10000, benefit: int_plus_1}
  4: {cash: 10000, benefit: weapon}
  5: {cash: 10000, benefit: edu_plus_1}
  6: {cash: 50000, benefit: ship_share, count: 2}
  7: {cash: 100000, benefit: tas_membership}

mishaps:
  1:
    text: Severely injured.
    effects:
      - {type: injury, severity: severe}
  2:
    text: Harassed and your life ruined by a criminal gang. Gain the gang as an Enemy.
    effects:
      - {type: gain_enemy}
  3:
    text: Hard times caused by a lack of interstellar trade costs you your job. Lose one SOC.
    effects:
      - {type: decrease_characteristic, characteristic: SOC, amount: 1}
  4:
    text: Your business or colony is investigated or interfered with.
    defer_ejection: true
    effects:
      - {type: citizen_mishap_4}
  5:
    text: A revolution, attack or unusual event throws life into chaos, forcing you to leave the planet.
    defer_ejection: true
    effects:
      - {type: citizen_mishap_5}
  6:
    text: Injured. Roll on the Injury table.
    effects:
      - {type: injury, severity: from_table}

events:
  2:
    text: "Disaster! Roll on the Mishap table but you are not ejected from this career."
    effects:
      - {type: roll_mishap, leave: false}
  3:
    text: Political upheaval strikes your homeworld or colony.
    effects:
      - {type: skill_choice, options: [Advocate, Persuade, Explosives, Streetwise], level: 1}
  4:
    text: You spend time maintaining and using heavy vehicles.
    effects:
      - {type: skill_choice, options: [Mechanic, Drive, Electronics, Flyer, Engineer], level: 1}
  5:
    text: Your business expands, your corporation grows, or your colony thrives.
    effects:
      - {type: benefit_dm, amount: 1}
  6:
    text: You are given advanced training in a specialist field.
    effects:
      - {type: citizen_event_6}
  7:
    text: Life Event.
    effects:
      - {type: life_event}
  8:
    text: You learn something illegal but profitable.
    effects:
      - {type: citizen_event_8}
  9:
    text: You are rewarded for your diligence or cunning.
    effects:
      - {type: advancement_dm, amount: 2}
  10:
    text: You gain experience in a technical field.
    effects:
      - {type: skill_choice, options: [Electronics, Engineer], level: 1}
  11:
    text: You befriend a superior in the corporation, bureaucracy or colony.
    effects:
      - {type: gain_ally}
  12:
    text: You rise to a position of power. You are automatically promoted.
    effects:
      - {type: auto_advance}
