name: Noble
source: Core
allows_assignment_change: true

qualification:
  characteristic: SOC
  target: 10

assignments:
  - name: Administrator
    survival: {characteristic: INT, target: 4}
    advancement: {characteristic: EDU, target: 6}
  - name: Diplomat
    survival: {characteristic: INT, target: 5}
    advancement: {characteristic: SOC, target: 7}
  - name: Dilettante
    survival: {characteristic: SOC, target: 5}
    advancement: {characteristic: INT, target: 7}

skill_tables:
  personal_development:
    1: {characteristic: STR}
    2: {characteristic: DEX}
    3: {characteristic: END}
    4: {skill: Gambler}
    5: {skill: Gun Combat}
    6: {skill: Melee}
  service_skills:
    1: {skill: Admin}
    2: {skill: Advocate}
    3: {skill: Electronics}
    4: {skill: Diplomat}
    5: {skill: Investigate}
    6: {skill: Persuade}
  advanced_education:
    min_edu: 8
    1: {skill: Science}
    2: {skill: Advocate}
    3: {skill: Language}
    4: {skill: Leadership}
    5: {skill: Diplomat}
    6: {skill: Art}
  administrator:
    1: {skill: Admin}
    2: {skill: Advocate}
    3: {skill: Broker}
    4: {skill: Diplomat}
    5: {skill: Leadership}
    6: {skill: Persuade}
  diplomat:
    1: {skill: Advocate}
    2: {skill: Carouse}
    3: {skill: Electronics}
    4: {skill: Steward}
    5: {skill: Diplomat}
    6: {skill: Deception}
  dilettante:
    1: {skill: Carouse}
    2: {skill: Deception}
    3: {skill: Flyer}
    4: {skill: Streetwise}
    5: {skill: Gambler}
    6: {skill: Jack-of-All-Trades}

ranks:
  0: {}
  1: {bonus: {skill: Admin, level: 1}}
  2: {}
  3: {bonus: {skill: Advocate, level: 1}}
  4: {}
  5: {bonus: {skill: Leadership, level: 1}}
  6: {}

ranks_by_assignment:
  Administrator:
    0: {title: Assistant}
    1: {title: Clerk, bonus: {skill: Admin, level: 1}}
    2: {title: Supervisor}
    3: {title: Manager, bonus: {skill: Advocate, level: 1}}
    4: {title: Chief}
    5: {title: Director, bonus: {skill: Leadership, level: 1}}
    6: {title: Minister}
  Diplomat:
    0: {title: Intern}
    1: {title: 3rd Secretary, bonus: {skill: Admin, level: 1}}
    2: {title: 2nd Secretary}
    3: {title: 1st Secretary, bonus: {skill: Advocate, level: 1}}
    4: {title: Counsellor}
    5: {title: Minister, bonus: {skill: Diplomat, level: 1}}
    6: {title: Ambassador}
  Dilettante:
    0: {title: Wastrel}
    1: {}
    2: {title: Ingrate, bonus: {skill: Carouse, level: 1}}
    3: {}
    4: {title: Black Sheep, bonus: {skill: Persuade, level: 1}}
    5: {}
    6: {title: Scoundrel, bonus: {skill: Jack-of-All-Trades, level: 1}}

muster_out:
  1: {cash: 10000, benefit: ship_share}
  2: {cash: 10000, benefit: ship_share, count: 2}
  3: {cash: 50000, benefit: blade}
  4: {cash: 50000, benefit: soc_plus_1}
  5: {cash: 100000, benefit: tas_membership}
  6: {cash: 100000, benefit: yacht}
  7: {cash: 200000, benefit: soc_plus_1_and_yacht}

mishaps:
  1: {text: Severely injured., effects: [{type: injury, severity: severe}]}
  2: {text: A family scandal forces you out of your position. Lose one SOC., effects: [{type: decrease_characteristic, characteristic: SOC, amount: 1}]}
  3: {text: A disaster or war strikes. Roll Stealth 8+ or Deception 8+ to escape unhurt., defer_ejection: true, effects: [{type: noble_mishap_3}]}
  4: {text: Political manoeuvrings usurp your position. Increase Diplomat or Advocate and gain a Rival., effects: [{type: skill_choice, options: [Diplomat, Advocate], level: 1}, {type: gain_rival}]}
  5: {text: An assassin attempts to end your life. Roll END 8+ or roll on the Injury table., defer_ejection: true, effects: [{type: noble_mishap_5}]}
  6: {text: Injured. Roll on the Injury table., effects: [{type: injury, severity: from_table}]}

events:
  2: {text: "Disaster! Roll on the Mishap table, but you are not ejected from this career.", effects: [{type: roll_mishap, leave: false}]}
  3: {text: You are challenged to a duel for your honour and standing., effects: [{type: skill_choice, options: [Melee, Leadership, Tactics, Deception], level: 1}]}
  4: {text: Your time as a ruler or playboy gives you a wide range of experiences., effects: [{type: skill_choice, options: [Animals, Art, Carouse, Streetwise], level: 1}]}
  5: {text: You inherit a gift from a rich relative., effects: [{type: benefit_dm, amount: 1}]}
  6: {text: You become deeply involved in politics., effects: [{type: skill_choice, options: [Advocate, Admin, Diplomat, Persuade], level: 1}, {type: gain_rival}]}
  7: {text: Life Event., effects: [{type: life_event}]}
  8: {text: A conspiracy of nobles attempts to recruit you., effects: [{type: noble_event_8}]}
  9: {text: Your reign is acclaimed as fair and wise., effects: [{type: gain_enemy}, {type: advancement_dm, amount: 2}]}
  10: {text: You manipulate and charm your way through high society., effects: [{type: skill_choice, options: [Carouse, Diplomat, Persuade, Steward], level: 1}, {type: gain_rival}, {type: gain_ally}]}
  11: {text: You make an alliance with a powerful noble., effects: [{type: gain_ally}, {type: skill_choice, options: [Leadership, advancement_dm_4], level: 1}]}
  12: {text: Your efforts do not go unnoticed by the Imperium. You are automatically promoted., effects: [{type: auto_advance}]}
