name: Agent
source: Core
allows_assignment_change: false
draft:
  assignment: Law Enforcement

qualification:
  characteristic: INT
  target: 6

assignments:
  - name: Law Enforcement
    survival: {characteristic: END, target: 6}
    advancement: {characteristic: INT, target: 6}
  - name: Intelligence
    survival: {characteristic: INT, target: 7}
    advancement: {characteristic: INT, target: 5}
  - name: Corporate
    survival: {characteristic: INT, target: 5}
    advancement: {characteristic: INT, target: 7}

skill_tables:
  personal_development:
    1: {skill: Gun Combat}
    2: {characteristic: DEX}
    3: {characteristic: END}
    4: {skill: Melee}
    5: {characteristic: INT}
    6: {skill: Athletics}
  service_skills:
    1: {skill: Streetwise}
    2: {skill: Drive}
    3: {skill: Investigate}
    4: {skill: Flyer}
    5: {skill: Recon}
    6: {skill: Gun Combat}
  advanced_education:
    min_edu: 8
    1: {skill: Advocate}
    2: {skill: Language}
    3: {skill: Explosives}
    4: {skill: Medic}
    5: {skill: Vacc Suit}
    6: {skill: Electronics}
  law enforcement:
    1: {skill: Investigate}
    2: {skill: Recon}
    3: {skill: Streetwise}
    4: {skill: Stealth}
    5: {skill: Melee}
    6: {skill: Advocate}
  intelligence:
    1: {skill: Investigate}
    2: {skill: Recon}
    3: {skill: Electronics}
    4: {skill: Stealth}
    5: {skill: Persuade}
    6: {skill: Deception}
  corporate:
    1: {skill: Investigate}
    2: {skill: Electronics}
    3: {skill: Stealth}
    4: {skill: Carouse}
    5: {skill: Deception}
    6: {skill: Streetwise}

ranks:
  0: {}
  1: {title: Agent, bonus: {skill: Deception, level: 1}}
  2: {title: Field Agent, bonus: {skill: Investigate, level: 1}}
  3: {}
  4: {title: Special Agent, bonus: {skill: Gun Combat, level: 1}}
  5: {title: Assistant Director}
  6: {title: Director}

ranks_by_assignment:
  Law Enforcement:
    0: {title: Rookie}
    1: {title: Corporal, bonus: {skill: Streetwise, level: 1}}
    2: {title: Sergeant}
    3: {title: Detective}
    4: {title: Lieutenant, bonus: {skill: Investigate, level: 1}}
    5: {title: Chief, bonus: {skill: Admin, level: 1}}
    6: {title: Commissioner, bonus: {characteristic: SOC, level: 1}}

muster_out:
  1: {cash: 1000, benefit: scientific_equipment}
  2: {cash: 2000, benefit: int_plus_1}
  3: {cash: 5000, benefit: ship_share}
  4: {cash: 7500, benefit: weapon}
  5: {cash: 10000, benefit: cybernetic_implant}
  6: {cash: 25000, benefit: [soc_plus_1, cybernetic_implant]}
  7: {cash: 50000, benefit: tas_membership}

mishaps:
  1:
    text: Severely injured. Alternatively, roll twice on the Injury table and take the lower result.
    effects:
      - {type: injury, severity: severe}
  2:
    text: >-
      A criminal or other figure under investigation offers you a deal. Accept and you leave this career without
      further penalty (although you lose the Benefit roll as normal). Refuse and you must roll twice on the Injury
      table and take the lower result. You gain an Enemy and one level in any skill you choose.
    defer_ejection: true
    effects:
      - {type: agent_mishap_2_choice}
  3:
    text: >-
      An investigation goes critically wrong or leads to the top, ruining your career. Roll Advocate 8+. If you
      succeed, you may keep the Benefit roll from this term. If you roll 2, you must take the Prisoner career in
      your next term.
    defer_ejection: true
    effects:
      - {type: agent_mishap_3}
  4:
    text: You learn something you should not know and people want to kill you for it. Gain an Enemy and Deception 1.
    effects:
      - {type: gain_enemy}
      - {type: gain_skill, skill: Deception, level: 1}
  5:
    text: >-
      Your work ends up coming home with you and someone gets hurt. Choose one of your Contacts, Allies or family
      members and roll twice on the Injury table for them, taking the lower result.
    defer_ejection: true
    effects:
      - {type: agent_mishap_5_choice}
  6:
    text: Injured. Roll on the Injury table.
    effects:
      - {type: injury, severity: from_table}

events:
  2:
    text: "Disaster! Roll on the Mishap table but you are not ejected from this career."
    effects:
      - {type: roll_mishap, leave: false}
  3:
    text: >-
      An investigation takes on a dangerous turn. Roll Investigate 8+ or Streetwise 8+. If you fail, roll on the
      Mishap table. If you succeed, increase one of these skills by one level — Deception, Jack-of-all-Trades,
      Persuade or Tactics.
    effects:
      - {type: agent_event_3}
  4:
    text: >-
      You complete a mission for your superiors and are suitably rewarded. Gain DM+1 to any one Benefit roll from
      this career.
    effects:
      - {type: benefit_dm, amount: 1}
  5:
    text: You establish a network of contacts. Gain D3 Contacts.
    effects:
      - {type: gain_connections_rolled, connection_type: contact, dice: d3}
  6:
    text: >-
      You are given advanced training in a specialist field. Roll EDU 8+ to increase any one skill you already
      have by one level.
    effects:
      - {type: agent_event_6}
  7:
    text: Life Event. Roll on the Life Events table.
    effects:
      - {type: life_event}
  8:
    text: >-
      You go undercover to investigate an enemy. Roll Deception 8+. If you succeed, roll immediately on the Rogue
      or Citizen Events table and make one roll on any Specialist skill table for that career. If you fail, roll
      immediately on the Rogue or Citizen Mishap table.
    effects:
      - {type: agent_event_8}
  9:
    text: You go above and beyond the call of duty. Gain DM+2 to your next advancement roll.
    effects:
      - {type: advancement_dm, amount: 2}
  10:
    text: You are given specialist training in vehicles. Gain one of Drive 1, Flyer 1, Pilot 1 or Gunner 1.
    effects:
      - {type: skill_choice, options: [Drive, Flyer, Pilot, Gunner], level: 1}
  11:
    text: >-
      You are befriended by a senior agent. Either increase Investigate by one level or DM+4 to an advancement
      roll thanks to their aid.
    effects:
      - {type: agent_event_11}
  12:
    text: Your efforts uncover a major conspiracy against your employers. You are automatically promoted.
    effects:
      - {type: auto_advance}
