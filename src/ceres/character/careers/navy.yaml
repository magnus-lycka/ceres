name: Navy
source: Core
allows_assignment_change: true
draft: true
commission:
  characteristic: SOC
  target: 8

qualification:
  characteristic: INT
  target: 6

assignments:
  - name: Line/Crew
    survival: {characteristic: INT, target: 5}
    advancement: {characteristic: EDU, target: 7}
  - name: Engineer/Gunner
    survival: {characteristic: INT, target: 6}
    advancement: {characteristic: EDU, target: 6}
  - name: Flight
    survival: {characteristic: DEX, target: 7}
    advancement: {characteristic: EDU, target: 5}

skill_tables:
  personal_development:
    1: {characteristic: STR}
    2: {characteristic: DEX}
    3: {characteristic: END}
    4: {characteristic: INT}
    5: {characteristic: EDU}
    6: {characteristic: SOC}
  service_skills:
    1: {skill: Pilot}
    2: {skill: Vacc Suit}
    3: {skill: Athletics}
    4: {skill: Gunner}
    5: {skill: Mechanic}
    6: {skill: Gun Combat}
  advanced_education:
    min_edu: 8
    1: {skill: Electronics}
    2: {skill: Astrogation}
    3: {skill: Engineer}
    4: {skill: Flyer}
    5: {skill: Medic}
    6: {skill: Admin}
  officer:
    1: {skill: Leadership}
    2: {skill: Electronics}
    3: {skill: Pilot}
    4: {skill: Melee, spec: Blade}
    5: {skill: Admin}
    6: {skill: Tactics, spec: Naval}
  line/crew:
    1: {skill: Electronics}
    2: {skill: Mechanic}
    3: {skill: Gun Combat}
    4: {skill: Flyer}
    5: {skill: Melee}
    6: {skill: Vacc Suit}
  engineer/gunner:
    1: {skill: Engineer}
    2: {skill: Mechanic}
    3: {skill: Electronics}
    4: {skill: Engineer}
    5: {skill: Gunner}
    6: {skill: Flyer}
  flight:
    1: {skill: Pilot}
    2: {skill: Flyer}
    3: {skill: Gunner}
    4: {skill: Pilot, spec: Small Craft}
    5: {skill: Astrogation}
    6: {skill: Electronics}

ranks:
  0: {title: Crewman}
  1: {title: Able Spacehand, bonus: {skill: Mechanic, level: 1}}
  2: {title: Petty Officer, 3rd class, bonus: {skill: Vacc Suit, level: 1}}
  3: {title: Petty Officer, 2nd class}
  4: {title: Petty Officer, 1st class, bonus: {characteristic: END, level: 1}}
  5: {title: Chief Petty Officer}
  6: {title: Master Chief}

officer_ranks:
  1: {title: Ensign, bonus: {skill: Melee, level: 1}}
  2: {title: Sublieutenant, bonus: {skill: Leadership, level: 1}}
  3: {title: Lieutenant}
  4: {title: Commander, bonus: {skill: Tactics, level: 1}}
  5: {title: Captain, bonus: {characteristic: SOC, level: 1}}
  6: {title: Admiral, bonus: {characteristic: SOC, level: 1}}

muster_out:
  1: {cash: 1000, benefit: [personal_vehicle, ship_share]}
  2: {cash: 5000, benefit: int_plus_1}
  3: {cash: 5000, benefit: [edu_plus_1, ship_share]}
  4: {cash: 10000, benefit: weapon}
  5: {cash: 20000, benefit: tas_membership}
  6: {cash: 50000, benefit: [ships_boat, ship_share]}
  7: {cash: 50000, benefit: soc_plus_2}

mishaps:
  1: {text: Severely injured in action., effects: [{type: injury, severity: severe}]}
  2: {text: Placed in the frozen watch and revived improperly. Reduce STR, DEX or END. You are not ejected., stay_in_career: true, effects: [{type: decrease_characteristic_choice, options: [STR, DEX, END], amount: 1}]}
  3: {text: During a battle, defeat or victory depends on your actions., effects: []}
  4: {text: Blamed for an accident that causes the death of several crew members., effects: []}
  5: {text: You quarrel with an officer or fellow crewman. Gain a Rival., effects: [{type: gain_rival}]}
  6: {text: Injured. Roll on the Injury table., effects: [{type: injury, severity: from_table}]}

events:
  2: {text: "Disaster! Roll on the Mishap table but you are not ejected from this career.", effects: [{type: roll_mishap, leave: false}]}
  3: {text: You join a gambling circle on board., effects: [{type: skill_choice, options: [Gambler, Deception], level: 1}]}
  4: {text: Given a special assignment or duty on board ship., effects: [{type: benefit_dm, amount: 1}]}
  5: {text: Advanced training in a specialist field., effects: []}
  6: {text: Your vessel participates in a notable military engagement., effects: [{type: skill_choice, options: [Electronics, Engineer, Gunner, Pilot], level: 1}]}
  7: {text: Life Event., effects: [{type: life_event}]}
  8: {text: Your vessel participates in a diplomatic mission., effects: [{type: skill_choice, options: [Recon, Diplomat, Steward], level: 1}, {type: gain_contact}]}
  9: {text: You foil an attempted crime on board. Gain an Enemy and DM+2 to next advancement., effects: [{type: gain_enemy}, {type: advancement_dm, amount: 2}]}
  10: {text: Opportunity to abuse your position for profit., effects: []}
  11: {text: Your commanding officer takes an interest in your career., effects: [{type: skill_choice, options: [Tactics, advancement_dm_4], level: 1}]}
  12: {text: You display heroism in battle, saving the whole ship., effects: [{type: auto_advance}]}
