name: Marines
source: Core
allows_assignment_change: true
draft: true
commission:
  characteristic: SOC
  target: 8

qualification:
  characteristic: END
  target: 6

assignments:
  - name: Support
    survival: {characteristic: END, target: 5}
    advancement: {characteristic: EDU, target: 7}
  - name: Star Marine
    survival: {characteristic: END, target: 6}
    advancement: {characteristic: EDU, target: 6}
  - name: Ground Assault
    survival: {characteristic: END, target: 7}
    advancement: {characteristic: EDU, target: 5}

skill_tables:
  personal_development:
    1: {characteristic: STR}
    2: {characteristic: DEX}
    3: {characteristic: END}
    4: {skill: Gambler}
    5: {skill: Melee, spec: Unarmed}
    6: {skill: Melee, spec: Blade}
  service_skills:
    1: {skill: Athletics}
    2: {skill: Vacc Suit}
    3: {skill: Tactics}
    4: {skill: Heavy Weapons}
    5: {skill: Gun Combat}
    6: {skill: Stealth}
  advanced_education:
    min_edu: 8
    1: {skill: Medic}
    2: {skill: Survival}
    3: {skill: Explosives}
    4: {skill: Engineer}
    5: {skill: Pilot}
    6: {skill: Navigation}
  officer:
    1: {skill: Electronics}
    2: {skill: Tactics}
    3: {skill: Admin}
    4: {skill: Advocate}
    5: {skill: Diplomat}
    6: {skill: Leadership}
  support:
    1: {skill: Electronics}
    2: {skill: Mechanic}
    3: {choices: [Drive, Flyer]}
    4: {skill: Medic}
    5: {skill: Heavy Weapons}
    6: {skill: Gun Combat}
  star marine:
    1: {skill: Vacc Suit}
    2: {skill: Athletics}
    3: {skill: Gunner}
    4: {skill: Melee, spec: Blade}
    5: {skill: Electronics}
    6: {skill: Gun Combat}
  ground assault:
    1: {skill: Vacc Suit}
    2: {skill: Heavy Weapons}
    3: {skill: Recon}
    4: {skill: Melee, spec: Blade}
    5: {skill: Tactics, spec: Military}
    6: {skill: Gun Combat}

ranks:
  0: {title: Marine}
  1: {title: Lance Corporal, bonus: {skill: Gun Combat, level: 1}}
  2: {title: Corporal}
  3: {title: Lance Sergeant, bonus: {skill: Leadership, level: 1}}
  4: {title: Sergeant}
  5: {title: Gunnery Sergeant, bonus: {characteristic: END, level: 1}}
  6: {title: Sergeant Major}

officer_ranks:
  1: {title: Lieutenant, bonus: {skill: Leadership, level: 1}}
  2: {title: Captain}
  3: {title: Force Commander, bonus: {skill: Tactics, level: 1}}
  4: {title: Lieutenant Colonel}
  5: {title: Colonel, bonus: {characteristic: SOC, level: 1}}
  6: {title: Brigadier}

muster_out:
  1: {cash: 2000, benefit: armor}
  2: {cash: 5000, benefit: int_plus_1}
  3: {cash: 5000, benefit: edu_plus_1}
  4: {cash: 10000, benefit: weapon}
  5: {cash: 20000, benefit: tas_membership}
  6: {cash: 30000, benefit: [armor, end_plus_1]}
  7: {cash: 40000, benefit: soc_plus_2}

mishaps:
  1: {text: Severely injured., effects: [{type: injury, severity: severe}]}
  2: {text: Captured and mistreated by the enemy. Gain your jailer as an Enemy and reduce STR and DEX by one., effects: [{type: gain_enemy}, {type: decrease_characteristic, characteristic: STR, amount: 1}, {type: decrease_characteristic, characteristic: DEX, amount: 1}]}
  3: {text: Stranded behind enemy lines. Increase Stealth or Survival but you are ejected., effects: [{type: skill_choice, options: [Stealth, Survival], level: 1}]}
  4: {text: Ordered to take part in a black ops mission that goes against your conscience., defer_ejection: true, effects: [{type: marines_mishap_4}]}
  5: {text: You quarrel with an officer or fellow marine. Gain a Rival., effects: [{type: gain_rival}]}
  6: {text: Injured. Roll on the Injury table., effects: [{type: injury, severity: from_table}]}

events:
  2: {text: "Disaster! Roll on the Mishap table but you are not ejected from this career.", effects: [{type: roll_mishap, leave: false}]}
  3: {text: Trapped behind enemy lines., effects: [{type: skill_choice, options: [Survival, Stealth, Deception, Streetwise], level: 1}]}
  4: {text: Assigned to the security staff of a space station., effects: [{type: skill_choice, options: [Vacc Suit, Athletics], level: 1}]}
  5: {text: Advanced training in a specialist field., effects: [{type: marines_event_5}]}
  6: {text: Assault on an enemy fortress., effects: [{type: marines_event_6}]}
  7: {text: Life Event., effects: [{type: life_event}]}
  8: {text: Front lines of a planetary assault and occupation., effects: [{type: skill_choice, options: [Recon, Gun Combat, Leadership, Electronics], level: 1}]}
  9: {text: A mission goes disastrously wrong due to your commander's error., effects: [{type: marines_event_9}]}
  10: {text: Assigned to a black ops mission., effects: [{type: advancement_dm, amount: 2}]}
  11: {text: Your commanding officer takes an interest in your career., effects: [{type: skill_choice, options: [Tactics, advancement_dm_4], level: 1}]}
  12: {text: You display heroism in battle. You may gain a promotion or a commission automatically., effects: [{type: auto_advance}]}
