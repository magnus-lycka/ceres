name: Scholar
description: >-
  Individuals trained in technological or research sciences who conduct scientific investigations into materials,
  situations and phenomena, or who practise medicine.
source: Core
allows_assignment_change: true

qualification:
  characteristic: INT
  target: 6

assignments:
  - name: Field Researcher
    description: You are an explorer or field researcher, equally at home in the laboratory or wilderness.
    survival: {characteristic: END, target: 6}
    advancement: {characteristic: INT, target: 6}
  - name: Scientist
    description: >-
      You are a researcher in some corporation or research institution or a mad scientist in an orbiting laboratory.
    survival: {characteristic: EDU, target: 4}
    advancement: {characteristic: INT, target: 8}
  - name: Physician
    description: You are a doctor, healer or medical researcher.
    survival: {characteristic: EDU, target: 4}
    advancement: {characteristic: EDU, target: 8}

skill_tables:
  personal_development:
    1: {characteristic: INT}
    2: {characteristic: EDU}
    3: {characteristic: SOC}
    4: {characteristic: DEX}
    5: {characteristic: END}
    6: {skill: Language}
  service_skills:
    1: {skill: Drive, choices: [Drive, Flyer]}
    2: {skill: Electronics}
    3: {skill: Diplomat}
    4: {skill: Medic}
    5: {skill: Investigate}
    6: {skill: Science}
  advanced_education:
    min_edu: 10
    1: {skill: Art}
    2: {skill: Advocate}
    3: {skill: Electronics}
    4: {skill: Language}
    5: {skill: Engineer}
    6: {skill: Science}
  field researcher:
    1: {skill: Electronics}
    2: {skill: Vacc Suit}
    3: {skill: Navigation}
    4: {skill: Survival}
    5: {skill: Investigate}
    6: {skill: Science}
  scientist:
    1: {skill: Admin}
    2: {skill: Engineer}
    3: {skill: Science}
    4: {skill: Science}
    5: {skill: Electronics}
    6: {skill: Science}
  physician:
    1: {skill: Medic}
    2: {skill: Electronics}
    3: {skill: Investigate}
    4: {skill: Medic}
    5: {skill: Persuade}
    6: {skill: Science}

ranks:
  0: {}
  1: {bonus: {skill: Science, level: 1}}
  2: {bonus: {skill: Electronics, level: 1}}
  3: {bonus: {skill: Investigate, level: 1}}
  4: {}
  5: {bonus: {skill: Science, level: 2}}
  6: {}

ranks_by_assignment:
  Physician:
    0: {}
    1: {bonus: {skill: Medic, level: 1}}
    2: {}
    3: {bonus: {skill: Science, level: 1}}
    4: {}
    5: {bonus: {skill: Science, level: 2}}
    6: {}

muster_out:
  1: {cash: 5000, benefit: int_plus_1}
  2: {cash: 10000, benefit: edu_plus_1}
  3: {cash: 20000, benefit: ship_share, count: 2}
  4: {cash: 30000, benefit: soc_plus_1}
  5: {cash: 40000, benefit: scientific_equipment}
  6: {cash: 60000, benefit: lab_ship}
  7: {cash: 100000, benefit: lab_ship}

mishaps:
  1:
    text: Severely injured.
    effects:
      - {type: injury, severity: severe}
  2:
    text: A disaster leaves several injured and others blame you, forcing you to leave your career. Gain a Rival.
    effects:
      - {type: injury, severity: from_table}
      - {type: gain_rival}
  3:
    text: The planetary government interferes with your research for political or religious reasons.
    stay_in_career: true
    effects:
      - {type: scholar_mishap_3_choice}
  4:
    text: An expedition or voyage goes wrong, leaving you stranded in the wilderness.
    effects:
      - {type: skill_choice, options: [Survival, Athletics], level: 1}
  5:
    text: Your work is sabotaged by unknown parties.
    stay_in_career: true
    effects:
      - {type: scholar_mishap_5_choice}
  6:
    text: >-
      A rival researcher blackens your name or steals your research. Gain a Rival but you do not have to leave
      this career.
    stay_in_career: true
    effects:
      - {type: gain_rival}

events:
  2:
    text: "Disaster! Roll on the Mishap table but you are not ejected from this career."
    effects:
      - {type: roll_mishap, leave: false}
  3:
    text: You are called upon to perform research that goes against your conscience.
    effects:
      - {type: scholar_event_3}
  4:
    text: You are assigned to work on a secret project for a patron or organisation.
    effects:
      - type: skill_choice
        options: [Medic, Life Science, Physical Science, Robotic Science, Social Science, Space Science,
                  Engineer, Electronics, Investigate]
        level: 1
  5:
    text: You win a prestigious prize for your work.
    effects:
      - {type: benefit_dm, amount: 1}
  6:
    text: You are given advanced training in a specialist field.
    effects:
      - {type: scholar_event_6}
  7:
    text: Life Event.
    effects:
      - {type: life_event}
  8:
    text: You have the opportunity to cheat in some fashion.
    effects:
      - {type: scholar_event_8}
  9:
    text: You make a breakthrough in your field.
    effects:
      - {type: advancement_dm, amount: 2}
  10:
    text: You become entangled in a bureaucratic or legal morass.
    effects:
      - {type: skill_choice, options: [Admin, Advocate, Persuade, Diplomat], level: 1}
  11:
    text: You work for an eccentric but brilliant mentor, who becomes an Ally.
    effects:
      - {type: gain_ally}
      - {type: scholar_event_11}
  12:
    text: Your work leads to a considerable breakthrough. You are automatically promoted.
    effects:
      - {type: auto_advance}
