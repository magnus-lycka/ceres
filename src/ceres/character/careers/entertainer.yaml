name: Entertainer
source: Core
allows_assignment_change: false

qualification:
  characteristic: INT
  target: 5

assignments:
  - name: Artist
    survival: {characteristic: SOC, target: 6}
    advancement: {characteristic: INT, target: 6}
  - name: Journalist
    survival: {characteristic: EDU, target: 7}
    advancement: {characteristic: INT, target: 5}
  - name: Performer
    survival: {characteristic: INT, target: 5}
    advancement: {characteristic: DEX, target: 7}

skill_tables:
  personal_development:
    1: {characteristic: DEX}
    2: {characteristic: INT}
    3: {characteristic: SOC}
    4: {skill: Language}
    5: {skill: Carouse}
    6: {skill: Jack-of-All-Trades}
  service_skills:
    1: {skill: Art}
    2: {skill: Carouse}
    3: {skill: Deception}
    4: {skill: Drive}
    5: {skill: Persuade}
    6: {skill: Steward}
  advanced_education:
    min_edu: 10
    1: {skill: Advocate}
    2: {skill: Broker}
    3: {skill: Deception}
    4: {skill: Science}
    5: {skill: Streetwise}
    6: {skill: Diplomat}
  artist:
    1: {skill: Art}
    2: {skill: Carouse}
    3: {skill: Electronics, spec: Computers}
    4: {skill: Gambler}
    5: {skill: Persuade}
    6: {skill: Profession}
  journalist:
    1: {skill: Presentation Art}
    2: {skill: Electronics}
    3: {skill: Drive}
    4: {skill: Investigate}
    5: {skill: Recon}
    6: {skill: Streetwise}
  performer:
    1: {skill: Performing Art}
    2: {skill: Athletics}
    3: {skill: Carouse}
    4: {skill: Deception}
    5: {skill: Stealth}
    6: {skill: Streetwise}

ranks:
  0: {}
  1: {bonus: {skill: Art, level: 1}}
  2: {}
  3: {bonus: {skill: Investigate, level: 1}}
  4: {}
  5: {title: Famous Artist, bonus: {characteristic: SOC, level: 1}}
  6: {}

ranks_by_assignment:
  Artist:
    0: {}
    1: {bonus: {skill: Art, level: 1}}
    2: {}
    3: {bonus: {skill: Investigate, level: 1}}
    4: {}
    5: {title: Famous Artist, bonus: {characteristic: SOC, level: 1}}
    6: {}
  Journalist:
    0: {}
    1: {title: Freelancer, bonus: {skill: Electronics, level: 1}}
    2: {title: Staff Writer, bonus: {skill: Investigate, level: 1}}
    3: {}
    4: {title: Correspondent, bonus: {skill: Persuade, level: 1}}
    5: {}
    6: {title: Senior Correspondent, bonus: {characteristic: SOC, level: 1}}
  Performer:
    0: {}
    1: {bonus: {characteristic: DEX, level: 1}}
    2: {}
    3: {bonus: {characteristic: STR, level: 1}}
    4: {}
    5: {title: Famous Performer, bonus: {characteristic: SOC, level: 1}}
    6: {}

muster_out:
  1: {cash: 0, benefit: contact}
  2: {cash: 0, benefit: soc_plus_1}
  3: {cash: 10000, benefit: contact}
  4: {cash: 10000, benefit: soc_plus_1}
  5: {cash: 40000, benefit: int_plus_1}
  6: {cash: 40000, benefit: ship_share, count: 2}
  7: {cash: 80000, benefit: soc_plus_1_and_edu_plus_1}

mishaps:
  1: {text: Severely injured., effects: [{type: injury, severity: severe}]}
  2: {text: You expose or are involved in a scandal of some sort., effects: []}
  3:
    text: Public opinion turns on you. Reduce SOC by 1.
    effects:
      - {type: decrease_characteristic, characteristic: SOC, amount: 1}
  4: {text: You are betrayed by a peer. Gain a Rival or Enemy., effects: [{type: gain_rival}]}
  5:
    text: A project goes wrong, stranding you far from home.
    effects:
      - {type: skill_choice, options: [Survival, Pilot, Persuade, Streetwise], level: 1}
  6: {text: You are forced out because of censorship or controversy., effects: [{type: advancement_dm, amount: 2}]}

events:
  2:
    text: Disaster! Roll on the Mishap table but you are not ejected from this career.
    effects:
      - {type: roll_mishap, leave: false}
  3:
    text: You are invited to take part in a controversial event or exhibition.
    effects:
      - {type: entertainer_event_3}
  4:
    text: You are part of your homeworld's celebrity circles.
    effects:
      - {type: skill_choice, options: [Carouse, Persuade, Steward], level: 1}
      - {type: gain_contact}
  5: {text: One of your works is especially well received and popular., effects: [{type: benefit_dm, amount: 1}]}
  6: {text: You gain a patron in the arts., effects: [{type: advancement_dm, amount: 2}, {type: gain_ally}]}
  7: {text: Life Event., effects: [{type: life_event}]}
  8:
    text: >-
      You have the opportunity to criticise or bring down a questionable political leader.
    effects:
      - {type: entertainer_event_8}
  9:
    text: You go on a tour of the sector, visiting several worlds.
    effects:
      - {type: gain_connections_rolled, connection_type: contact, dice: d3}
  10:
    text: >-
      One of your pieces of art is stolen and the investigation brings you into the criminal underworld.
    effects:
      - {type: skill_choice, options: [Streetwise, Investigate, Recon, Stealth], level: 1}
  11: {text: As an artist, you lead a strange and charmed life., effects: [{type: life_event}]}
  12: {text: You win a prestigious prize. You are automatically promoted., effects: [{type: auto_advance}]}
