name: Rogue
source: Core
allows_assignment_change: true

qualification:
  characteristic: DEX
  target: 6

assignments:
  - name: Thief
    survival: {characteristic: INT, target: 6}
    advancement: {characteristic: DEX, target: 6}
  - name: Enforcer
    survival: {characteristic: END, target: 6}
    advancement: {characteristic: STR, target: 6}
  - name: Pirate
    survival: {characteristic: DEX, target: 6}
    advancement: {characteristic: INT, target: 6}

skill_tables:
  personal_development:
    1: {skill: Carouse}
    2: {characteristic: DEX}
    3: {characteristic: END}
    4: {skill: Gambler}
    5: {skill: Melee}
    6: {skill: Gun Combat}
  service_skills:
    1: {skill: Deception}
    2: {skill: Recon}
    3: {skill: Athletics}
    4: {skill: Gun Combat}
    5: {skill: Stealth}
    6: {skill: Streetwise}
  advanced_education:
    min_edu: 10
    1: {skill: Electronics}
    2: {skill: Navigation}
    3: {skill: Medic}
    4: {skill: Investigate}
    5: {skill: Broker}
    6: {skill: Advocate}
  thief:
    1: {skill: Stealth}
    2: {skill: Electronics}
    3: {skill: Recon}
    4: {skill: Streetwise}
    5: {skill: Deception}
    6: {skill: Athletics}
  enforcer:
    1: {skill: Gun Combat}
    2: {skill: Melee}
    3: {skill: Streetwise}
    4: {skill: Persuade}
    5: {skill: Athletics}
    6: {skill: Drive}
  pirate:
    1: {skill: Pilot}
    2: {skill: Astrogation}
    3: {skill: Gunner}
    4: {skill: Engineer}
    5: {skill: Vacc Suit}
    6: {skill: Melee}

ranks:
  0: {}
  1: {bonus: {skill: Stealth, level: 1}}
  2: {}
  3: {bonus: {skill: Streetwise, level: 1}}
  4: {}
  5: {bonus: {skill: Recon, level: 1}}
  6: {}

ranks_by_assignment:
  Thief:
    0: {}
    1: {bonus: {skill: Stealth, level: 1}}
    2: {}
    3: {bonus: {skill: Streetwise, level: 1}}
    4: {}
    5: {bonus: {skill: Recon, level: 1}}
    6: {}
  Enforcer:
    0: {}
    1: {bonus: {skill: Persuade, level: 1}}
    2: {}
    3: {bonus: {skill: Gun Combat, choices: [Gun Combat, Melee], level: 1}}
    4: {}
    5: {bonus: {skill: Streetwise, level: 1}}
    6: {}
  Pirate:
    0: {title: Lackey}
    1: {title: Henchman, bonus: {skill: Pilot, choices: [Pilot, Gunner], level: 1}}
    2: {title: Corporal}
    3: {title: Sergeant, bonus: {skill: Gun Combat, choices: [Gun Combat, Melee], level: 1}}
    4: {title: Lieutenant}
    5: {title: Leader, bonus: {skill: Leadership, level: 1}}
    6: {title: Captain}

muster_out:
  1: {cash: 0, benefit: ship_share}
  2: {cash: 0, benefit: weapon}
  3: {cash: 10000, benefit: int_plus_1}
  4: {cash: 10000, benefit: ship_share, count: 1}
  5: {cash: 50000, benefit: armor}
  6: {cash: 100000, benefit: dex_plus_1}
  7: {cash: 100000, benefit: ship_share, count: 2}

mishaps:
  1: {text: Severely injured., effects: [{type: injury, severity: severe}]}
  2: {text: Arrested. You must take the Prisoner career in your next term., effects: []}
  3: {text: Betrayed by a friend. Gain a Rival or Enemy., effects: [{type: gain_rival}]}
  4: {text: A job goes wrong, forcing you to flee off-planet., effects: [{type: skill_choice, options: [Deception, Pilot, Athletics, Gunner], level: 1}]}
  5: {text: A police detective or rival criminal forces you to flee and vows to hunt you down., effects: [{type: gain_enemy}]}
  6: {text: Injured. Roll on the Injury table., effects: [{type: injury, severity: from_table}]}

events:
  2: {text: "Disaster! Roll on the Mishap table but you are not ejected from this career.", effects: [{type: roll_mishap, leave: false}]}
  3: {text: You are arrested and charged., effects: []}
  4: {text: You are involved in the planning of an impressive heist., effects: [{type: skill_choice, options: [Electronics, Mechanic], level: 1}]}
  5: {text: One of your crimes pays off., effects: [{type: benefit_dm, amount: 2}, {type: gain_enemy}]}
  6: {text: You have the opportunity to backstab a fellow rogue for personal gain., effects: []}
  7: {text: Life Event., effects: [{type: life_event}]}
  8: {text: You spend months in the dangerous criminal underworld., effects: [{type: skill_choice, options: [Streetwise, Stealth, Melee, Gun Combat], level: 1}]}
  9: {text: You become involved in a feud with a rival criminal organisation., effects: []}
  10: {text: You are involved in a gambling ring. Gain Gambler 1., effects: [{type: gain_skill, skill: Gambler, level: 1}]}
  11: {text: A crime lord considers you his protege., effects: [{type: skill_choice, options: [Tactics, advancement_dm_4], level: 1}]}
  12: {text: You commit a legendary crime. You are automatically promoted., effects: [{type: auto_advance}]}
