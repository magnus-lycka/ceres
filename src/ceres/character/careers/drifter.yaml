name: Drifter
source: Core
allows_assignment_change: true

qualification:
  characteristic: END
  target: 0

assignments:
  - name: Barbarian
    survival: {characteristic: END, target: 7}
    advancement: {characteristic: STR, target: 7}
  - name: Wanderer
    survival: {characteristic: END, target: 7}
    advancement: {characteristic: INT, target: 7}
  - name: Scavenger
    survival: {characteristic: DEX, target: 7}
    advancement: {characteristic: END, target: 7}

skill_tables:
  personal_development:
    1: {characteristic: STR}
    2: {characteristic: END}
    3: {characteristic: DEX}
    4: {skill: Language}
    5: {skill: Profession}
    6: {skill: Jack-of-All-Trades}
  service_skills:
    1: {skill: Athletics}
    2: {skill: Melee, choices: [Melee]}
    3: {skill: Recon}
    4: {skill: Streetwise}
    5: {skill: Stealth}
    6: {skill: Survival}
  barbarian:
    1: {skill: Animals}
    2: {skill: Carouse}
    3: {skill: Melee, choices: [Melee]}
    4: {skill: Stealth}
    5: {skill: Seafarer, choices: [Seafarer]}
    6: {skill: Survival}
  wanderer:
    1: {skill: Drive}
    2: {skill: Deception}
    3: {skill: Recon}
    4: {skill: Stealth}
    5: {skill: Streetwise}
    6: {skill: Survival}
  scavenger:
    1: {skill: Pilot, choices: [Pilot]}
    2: {skill: Mechanic}
    3: {skill: Astrogation}
    4: {skill: Vacc Suit}
    5: {skill: Profession}
    6: {skill: Gun Combat}

ranks:
  0: {}
  1: {}
  2: {}
  3: {}
  4: {}
  5: {}
  6: {}

ranks_by_assignment:
  Barbarian:
    0: {}
    1: {bonus: {skill: Survival, level: 1}}
    2: {title: Warrior, bonus: {skill: Melee, level: 1}}
    3: {}
    4: {title: Chieftain, bonus: {skill: Leadership, level: 1}}
    5: {}
    6: {title: Warlord}
  Wanderer:
    0: {}
    1: {bonus: {skill: Streetwise, level: 1}}
    2: {}
    3: {bonus: {skill: Deception, level: 1}}
    4: {}
    5: {}
    6: {}
  Scavenger:
    0: {}
    1: {bonus: {skill: Vacc Suit, level: 1}}
    2: {}
    3: {bonus: {skill: Mechanic, level: 1}}
    4: {}
    5: {}
    6: {}

muster_out:
  1: {cash: 0, benefit: contact}
  2: {cash: 0, benefit: weapon}
  3: {cash: 1000, benefit: ally}
  4: {cash: 2000, benefit: weapon}
  5: {cash: 3000, benefit: edu_plus_1}
  6: {cash: 4000, benefit: ship_share}
  7: {cash: 8000, benefit: ship_share, count: 2}

mishaps:
  1:
    text: Severely injured.
    effects:
      - {type: injury, severity: severe}
  2:
    text: Injured. Roll on the Injury table.
    effects:
      - {type: injury, severity: from_table}
  3:
    text: You run afoul of a criminal gang, corrupt bureaucrat or other foe. Gain an Enemy.
    effects:
      - {type: gain_enemy}
  4:
    text: You suffer from a life-threatening illness. Reduce your END by 1.
    effects:
      - {type: decrease_characteristic, characteristic: END, amount: 1}
  5:
    text: Betrayed by a friend.
    effects:
      - {type: gain_rival}
  6:
    text: You do not know what happened to you. There is a gap in your memory.
    effects: []

events:
  2:
    text: "Disaster! Roll on the Mishap table but you are not ejected from this career."
    effects:
      - {type: roll_mishap, leave: false}
  3:
    text: A patron offers you a chance at a job.
    effects: []
  4:
    text: You pick up a few useful skills here and there.
    effects:
      - {type: skill_choice, options: [Jack-of-All-Trades, Survival, Streetwise, Melee], level: 1}
  5:
    text: You manage to scavenge something of use.
    effects:
      - {type: benefit_dm, amount: 1}
  6:
    text: You encounter something unusual.
    effects:
      - {type: life_event}
  7:
    text: Life Event.
    effects:
      - {type: life_event}
  8:
    text: You are attacked by enemies.
    effects: []
  9:
    text: You are offered a chance to take part in a risky but rewarding adventure.
    effects: []
  10:
    text: Life on the edge hones your abilities.
    effects:
      - {type: skill_choice, options: [], level: 1}
  11:
    text: You are forcibly drafted.
    effects: []
  12:
    text: You thrive on adversity. You are automatically promoted.
    effects:
      - {type: auto_advance}
