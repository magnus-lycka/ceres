<form hx-post="/ui/characters/{{ character_id }}/events"
      hx-target="#pending-panel"
      hx-swap="innerHTML"
      hx-indicator="#spinner">
  <input type="hidden" name="fulfills" value="{{ pi.id }}">
  <div class="space-y-4 mb-4">
    <div class="flex flex-wrap gap-3">
      {% if pi.can_draft %}
      <label class="flex items-center gap-2 px-3 py-2 border border-gray-700 hover:border-amber-600 cursor-pointer text-sm">
        <input type="radio" name="choice" value="draft" checked class="accent-amber-500"
               onchange="document.getElementById('draft-panel').classList.remove('hidden');document.getElementById('drifter-panel').classList.add('hidden')">
        <span class="text-gray-300">Submit to the draft</span>
      </label>
      {% endif %}
      <label class="flex items-center gap-2 px-3 py-2 border border-gray-700 hover:border-amber-600 cursor-pointer text-sm">
        <input type="radio" name="choice" value="drifter" {% if not pi.can_draft %}checked{% endif %}
               class="accent-amber-500"
               onchange="document.getElementById('draft-panel').classList.add('hidden');document.getElementById('drifter-panel').classList.remove('hidden')">
        <span class="text-gray-300">Become a Drifter</span>
      </label>
    </div>
    <div id="draft-panel" {% if not pi.can_draft %}class="hidden"{% endif %}>
      <p class="text-xs text-gray-500 mb-2">Draft table: 1 Navy · 2 Army · 3 Marines · 4 Merchant · 5 Scout · 6 Agent</p>
      <label class="block text-xs text-gray-500 mb-1">1D roll</label>
      <input type="number" name="roll" min="1" max="6" required
             class="w-32 bg-gray-900 border border-gray-700 text-gray-100 px-3 py-2 text-center text-lg font-bold focus:outline-none focus:border-amber-500">
    </div>
    <div id="drifter-panel" class="hidden">
      <label class="block text-xs text-gray-500 mb-1">Drifter assignment</label>
      <select name="assignment" class="w-full bg-gray-900 border border-gray-700 text-gray-100 px-3 py-2 focus:outline-none focus:border-amber-500">
        {% set drifter = item.extra.get('careers', {}).get('Drifter') %}
        {% if drifter %}
        {% for a in drifter.assignments %}
        <option value="{{ a.name }}">{{ a.name }}</option>
        {% endfor %}
        {% else %}
        <option value="Wanderer">Wanderer</option>
        {% endif %}
      </select>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <button type="submit"
            class="bg-amber-600 hover:bg-amber-500 text-black font-bold px-6 py-2 text-sm uppercase tracking-wide">
      Confirm →
    </button>
    <span id="spinner" class="htmx-indicator text-gray-500 text-xs">Working…</span>
  </div>
</form>
