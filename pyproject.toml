[project]
name = "ceres"
version = "0.1.0"
description = "Ship Design for Mongoose Traveller 2nd edition"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.12.5",
    "pymupdf-layout>=1.27.1",
    "pymupdf4llm>=0.3.3",
]
[build-system]
requires = ["uv_build>=0.9.26,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
]

[[tool.ty.overrides]]
include = ["tests/", "examples/"]
rules = {invalid-argument-type = "ignore", unresolved-attribute = "ignore"}
